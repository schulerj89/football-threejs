<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Football JS Play Art Gallery</title>
  <style>
    body { margin: 0; background: #07100d; color: #f4f8f5; font-family: Arial, sans-serif; }
    main { padding: 24px; }
    h1, h2 { margin: 0 0 12px; }
    .context, .grid { display: grid; gap: 16px; }
    .grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    figure { margin: 0; padding: 12px; border: 1px solid rgba(255,255,255,.16); border-radius: 8px; background: rgba(255,255,255,.05); }
    img { display: block; width: 100%; height: auto; border-radius: 6px; background: #102018; }
    figcaption { margin-top: 10px; color: #cbd8d0; font-size: 13px; line-height: 1.4; }
    code { color: #f6e27a; }
    .missing { display: grid; min-height: 160px; place-items: center; border: 1px dashed rgba(255,255,255,.24); border-radius: 6px; color: #b8c4bd; }
  </style>
</head>
<body>
  <main>
    <h1>Football JS Play Art Gallery</h1>
    <p>GPT Image 2 candidates are blank play-card backgrounds. Runtime SVG routes, blocks, players, and arrows stay data-driven on top.</p>
    <section class="context">
      <h2>Current Play SVG Screenshot Context</h2>
      <figure><img src="/branding/play-art/current-play-svg-context.png" alt="Current play-card SVG context screenshot"><figcaption>Reference screenshot used for context when available.</figcaption></figure>
    </section>
    <h2>Candidates</h2>
    <section class="grid">
      
        <figure>
          <img src="/branding/play-art/candidate-a.webp" alt="candidate-a play-card background candidate">
          <figcaption>
            <strong>candidate-a</strong><br>
            Modern broadcast telestrator board with dark turf and clean overlay room.<br>
            112722 bytes, hash <code>a97c1e3a86fb</code>
          </figcaption>
        </figure>
      
        <figure>
          <img src="/branding/play-art/candidate-b.webp" alt="candidate-b play-card background candidate">
          <figcaption>
            <strong>candidate-b</strong><br>
            Chalkboard/telestrator hybrid with field texture and restrained console style.<br>
            163304 bytes, hash <code>7849fe286b65</code>
          </figcaption>
        </figure>
      
        <figure>
          <img src="/branding/play-art/candidate-c.webp" alt="candidate-c play-card background candidate">
          <figcaption>
            <strong>candidate-c</strong><br>
            Minimal stadium-board panel with strongest route-overlay readability.<br>
            106650 bytes, hash <code>626a1aa550ce</code>
          </figcaption>
        </figure>
      
    </section>
  </main>
</body>
</html>
